spring:
  application:
    name: backend

  # ===================================================================
  # 1. DATABASE CONNECTION CONFIGURATION
  # ===================================================================
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/research_management_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: mat_khau_cua_ban
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===================================================================
  # 2. JPA / HIBERNATE CONFIGURATION
  # ===================================================================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===================================================================
  # 3. FLYWAY MIGRATION CONFIGURATION
  # ===================================================================
  flyway:
    enabled: true
    encoding: UTF-8
    baseline-on-migrate: true
    locations: classpath:db/migration

# ===================================================================
# 4. APPLICATION-SPECIFIC PROPERTIES
# ===================================================================
app:
  jwt:
    # Bắt buộc sử dụng chuỗi mã hóa chuẩn BASE64 (Dưới đây là chuỗi an toàn 512-bit)
    secret: V1hVbURGOWV3N2pGNTZzSzh4MnpCNnE4M3Y1YjlBMEQzRjdIMUwyTTROOFA5UVEyVjRZNlg3WjhBMUMyRTNGNA==
    expiration: 86400000

# ===================================================================
# 5. SPRINGDOC CONFIGURATION
# ===================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    disable-swagger-default-url: true
    try-it-out-enabled: true
    filter: true
  packages-to-scan: com.researchsystem.backend.controller
  cache:
    disabled: true
  pre-loading-enabled: false
  show-actuator: false
  default-produces-media-type: application/json
